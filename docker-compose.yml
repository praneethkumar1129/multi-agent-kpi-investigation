services:

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: kpi_backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - ./backend/.env
    environment:
      PORT: "8080"
      PYTHONUNBUFFERED: "1"
    volumes:
      # Mount GCP service-account key at runtime — never bake credentials into the image
      - ./credentials:/app/credentials:ro
    networks:
      - kpi_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 25s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: kpi_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - kpi_network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  kpi_network:
    driver: bridge
