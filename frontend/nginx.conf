server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Gzip ──────────────────────────────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_min_length   1024;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_buffers      16 8k;
    gzip_http_version 1.1;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff2;

    # ── Security headers ───────────────────────────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN"                        always;
    add_header X-Content-Type-Options "nosniff"                           always;
    add_header X-XSS-Protection       "1; mode=block"                     always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin"   always;
    add_header Permissions-Policy     "camera=(), microphone=(), geolocation=()" always;

    # ── Vite-hashed static assets — immutable 1-year cache ────────────────────
    # Vite uses content-hashed filenames for long-term caching.
    # But in some Cloud Run rollouts, aggressive caching can keep stale bundles.
    location ~* ^/assets/.*\.(js|css)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    access_log off;
}

    # Non-hashed assets (or any unexpected filenames): cache briefly.
    location ~* \.(?:js|css)$ {
        expires 15m;
        add_header Cache-Control "public, max-age=900";
        access_log off;
    }


    # ── index.html — never cache so new deploys are picked up immediately ──────
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header Pragma "no-cache";
    }

    # ── SPA fallback ───────────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Health probe used by Docker HEALTHCHECK ────────────────────────────────
    location = /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
